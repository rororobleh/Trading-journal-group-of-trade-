<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b0e14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trading Pro">
    <title>Trading Journal Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230b0e14'/%3E%3Ctext x='50' y='65' font-size='55' text-anchor='middle' fill='%233b82f6'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg-primary: #0b0e14; --bg-secondary: #151a23; --bg-tertiary: #1e2532;
            --text-primary: #e2e8f0; --text-secondary: #94a3b8; --accent: #3b82f6;
            --accent-hover: #2563eb; --success: #10b981; --success-bg: rgba(16, 185, 129, 0.1);
            --danger: #ef4444; --danger-bg: rgba(239, 68, 68, 0.1); --warning: #f59e0b;
            --warning-bg: rgba(245, 158, 11, 0.1); --border: #2d3748;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
        #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: linear-gradient(135deg, var(--bg-primary) 0%, #1a202c 100%); }
        .setup-card { background: var(--bg-secondary); padding: 30px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .setup-card h1 { text-align: center; margin-bottom: 20px; color: var(--accent); font-size: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 16px; }
        .btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-secondary { background: var(--bg-tertiary); border: 1px solid var(--border); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        #app-container { display: none; max-width: 1200px; margin: 0 auto; padding: 16px; }
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--bg-secondary); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 600; flex-wrap: wrap; }
        .breadcrumb span { color: var(--text-secondary); cursor: pointer; }
        .breadcrumb span:hover, .breadcrumb .current { color: var(--accent); cursor: default; }
        .header-stats { display: flex; gap: 12px; font-size: 13px; }
        .stat-pill { background: var(--bg-tertiary); padding: 6px 12px; border-radius: 16px; border: 1px solid var(--border); }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .grid-months, .grid-weeks { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; }
        .card:active { transform: scale(0.98); }
        .card h3 { font-size: 18px; margin-bottom: 6px; }
        .card p { color: var(--text-secondary); font-size: 13px; }
        .card .badge { position: absolute; top: 12px; right: 12px; background: var(--bg-tertiary); padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; }
        .week-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-box { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
        .stat-box .value { font-size: 24px; font-weight: 700; margin-bottom: 2px; }
        .stat-box .label { color: var(--text-secondary); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .trades-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .trade-slot { background: var(--bg-secondary); border: 2px dashed var(--border); border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; min-height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .trade-slot.filled { border-style: solid; text-align: left; justify-content: flex-start; }
        .trade-slot.win { border-color: var(--success); background: var(--success-bg); }
        .trade-slot.loss { border-color: var(--danger); background: var(--danger-bg); }
        .trade-slot.be { border-color: var(--warning); background: var(--warning-bg); }
        .trade-number { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 6px; }
        .trade-pair { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .trade-result { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .result-win { background: var(--success); color: white; }
        .result-loss { background: var(--danger); color: white; }
        .result-be { background: var(--warning); color: black; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: flex-end; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-secondary); border-radius: 20px 20px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; padding: 24px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
        .close-btn { background: var(--bg-tertiary); border: none; color: var(--text-primary); font-size: 20px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .lot-calculator { background: var(--bg-tertiary); border: 1px solid var(--accent); border-radius: 8px; padding: 14px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .lot-calculator .calc-value { font-size: 20px; font-weight: 700; color: var(--accent); }
        .screenshots { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .screenshot-box { background: var(--bg-tertiary); border: 1px dashed var(--border); border-radius: 8px; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); position: relative; overflow: hidden; font-size: 12px; }
        .screenshot-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .screenshot-box input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
        .hidden { display: none !important; }
        @media (min-width: 768px) {
            .modal-overlay { align-items: center; }
            .modal-content { border-radius: 16px; max-width: 600px; }
            .trades-grid { grid-template-columns: repeat(4, 1fr); }
            .week-stats { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-card">
            <h1>📊 Trading Journal Pro</h1>
            <div class="form-group">
                <label>Année</label>
                <input type="number" id="journal-year" placeholder="Ex: 2025" step="1" min="2000" max="2100" value="">
            </div>
            <div class="form-group">
                <label>Balance Initiale ($)</label>
                <input type="number" id="initial-balance" placeholder="Ex: 10000" step="0.01">
            </div>
            <div class="form-group">
                <label>Risque par Trade (%)</label>
                <input type="number" id="risk-percent" placeholder="Ex: 1 ou 2" step="0.1" max="100">
            </div>
            <button class="btn" onclick="initializeApp()">Commencer</button>
            <button class="btn btn-secondary" onclick="loadFromStorage()" style="margin-top: 12px;">Restaurer sauvegarde</button>
            <p style="text-align:center; color: var(--text-secondary); font-size: 12px; margin-top: 12px;">💡 100% hors-ligne — vos données restent sur cet appareil.</p>
        </div>
    </div>

    <div id="app-container">
        <div class="app-header">
            <div class="breadcrumb" id="breadcrumb">
                <span onclick="showView('months')">Accueil</span>
            </div>
            <div class="header-stats">
                <div class="stat-pill" id="display-year">📅 2025</div>
                <div class="stat-pill">Solde: <strong id="display-balance">$0</strong></div>
                <div class="stat-pill" id="save-status" style="transition: opacity .3s;">✅ Synchro</div>
                <button class="btn btn-secondary" onclick="exportData()" style="width: auto; padding: 6px 12px; margin: 0; font-size: 12px;">💾 Exporter</button>
                <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()" style="width: auto; padding: 6px 12px; margin: 0; font-size: 12px;">📂 Importer</button>
                <button class="btn btn-danger" onclick="resetApp()" style="width: auto; padding: 6px 12px; margin: 0; font-size: 12px;">🗑️ Reset</button>
                <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importData(this)">
            </div>
        </div>

        <div id="view-months" class="view active">
            <h2 style="margin-bottom: 16px; color: var(--text-secondary); font-size: 18px;">Mois</h2>
            <div class="grid-months" id="months-grid"></div>
        </div>

        <div id="view-weeks" class="view">
            <h2 style="margin-bottom: 16px; color: var(--text-secondary); font-size: 18px;" id="weeks-title">Semaines</h2>
            <div class="grid-weeks" id="weeks-grid"></div>
        </div>

        <div id="view-trades" class="view">
            <div class="week-stats">
                <div class="stat-box"><div class="value" id="stat-wins" style="color: var(--success);">0</div><div class="label">Gains</div></div>
                <div class="stat-box"><div class="value" id="stat-winrate">0%</div><div class="label">Win Rate</div></div>
                <div class="stat-box"><div class="value" id="stat-tp" style="color: var(--success);">0</div><div class="label">Total TP</div></div>
                <div class="stat-box"><div class="value" id="stat-sl" style="color: var(--danger);">0</div><div class="label">Total SL</div></div>
            </div>
            <h3 style="margin-bottom: 12px; color: var(--text-secondary); font-size: 16px;">8 Trades / Semaine</h3>
            <div class="trades-grid" id="trades-grid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="trade-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" style="font-size: 20px;">Trade</h2>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <form id="trade-form" onsubmit="saveTrade(event)">
                <input type="hidden" id="trade-index">
                <div class="lot-calculator">
                    <div><div style="font-size: 12px; color: var(--text-secondary);">Risque: <span id="calc-risk-amt">$0</span> | SL: <span id="calc-sl-display">0</span> pips</div></div>
                    <div class="calc-value" id="calc-lot">0.00 Lot</div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Paire</label>
                        <select id="t-pair" required>
                            <option value="EUR/USD">🇪🇺🇺🇸 EUR/USD</option>
                            <option value="GBP/USD">🇬🇧🇺🇸 GBP/USD</option>
                            <option value="XAU/USD">🥇🇺🇸 XAU/USD</option>
                            <option value="BTC/USD">₿🇺🇸 BTC/USD</option>
                            <option value="USD/CAD">🇺🇸🇨🇦 USD/CAD</option>
                            <option value="USD/CHF">🇺🇸🇨🇭 USD/CHF</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Direction</label>
                        <select id="t-direction" required><option value="LONG">📈 LONG</option><option value="SHORT">📉 SHORT</option></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Date</label><input type="date" id="t-date" required></div>
                    <div class="form-group"><label>Heure</label><input type="time" id="t-time" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Session</label>
                        <select id="t-session"><option>Londres</option><option>New York</option><option>Asie</option><option>Overlap</option></select>
                    </div>
                    <div class="form-group"><label>Stratégie</label><input type="text" id="t-strategy" placeholder="Ex: s1, Breakout" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>SL (pips)</label><input type="number" id="t-sl" placeholder="20" required></div>
                    <div class="form-group"><label>TP (pips)</label><input type="number" id="t-tp" placeholder="40" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Résultat</label>
                        <select id="t-result" required><option value="WIN">✅ WIN</option><option value="LOSS">❌ LOSS</option><option value="BE">⚖️ BE</option></select>
                    </div>
                    <div class="form-group">
                        <label>P&L Réalisé ($) <span style="font-size:10px; color:var(--accent)">(Auto)</span></label>
                        <input type="number" id="t-pnl" placeholder="0.00" step="0.01" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Émotion</label>
                    <select id="t-emotion"><option value="😐">😐 Neutre</option><option value="😊">😊 Confiant</option><option value="😰">😰 Anxieux</option><option value="🧘">🧘 Discipliné</option></select>
                </div>
                <div class="screenshots">
                    <div class="screenshot-box"><span>📷 Avant</span><input type="file" accept="image/*" onchange="handleImage(this, 'img-before')"><img id="img-before" class="hidden"></div>
                    <div class="screenshot-box"><span>📷 Après</span><input type="file" accept="image/*" onchange="handleImage(this, 'img-after')"><img id="img-after" class="hidden"></div>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button type="button" class="btn btn-danger" onclick="deleteTrade()" id="btn-delete" style="display: none; width: 30%;">Suppr.</button>
                    <button type="submit" class="btn btn-success" style="flex: 1;">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let appState = { version: 3, year: new Date().getFullYear(), balance: 0, riskPercent: 0, weeks: {} };
        let currentMonth = null, currentWeek = null, currentTradeIndex = null;
        const monthWeeksMap = { "Janvier": [1,2,3,4,5], "Février": [6,7,8,9], "Mars": [10,11,12,13], "Avril": [14,15,16,17], "Mai": [18,19,20,21,22], "Juin": [23,24,25,26], "Juillet": [27,28,29,30,31], "Août": [32,33,34,35], "Septembre": [36,37,38,39], "Octobre": [40,41,42,43,44], "Novembre": [45,46,47,48], "Décembre": [49,50,51,52,53] };
        const monthsList = Object.keys(monthWeeksMap);
        const pairFlags = {
            'EUR/USD': '🇪🇺🇺🇸', 'GBP/USD': '🇬🇧🇺🇸', 'XAU/USD': '🥇🇺🇸',
            'BTC/USD': '₿🇺🇸', 'USD/CAD': '🇺🇸🇨🇦', 'USD/CHF': '🇺🇸🇨🇭'
        };

        function resetApp() {
            if (!confirm("⚠️ Cela supprimera DÉFINITIVEMENT toutes vos données. Pensez à exporter avant. Continuer ?")) return;
            if (!confirm("Êtes-vous vraiment sûr ? Cette action est irréversible.")) return;
            localStorage.removeItem('tradingJournal_v2');
            location.reload();
        }
        function initializeApp() {
            const year = parseInt(document.getElementById('journal-year').value);
            const balance = parseFloat(document.getElementById('initial-balance').value);
            const risk = parseFloat(document.getElementById('risk-percent').value);
            if (!year || year < 2000 || year > 2100 || !balance || !risk || balance <= 0 || risk <= 0) return alert("Données invalides");
            appState.year = year; appState.balance = balance; appState.riskPercent = risk;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            updateHeaderStats(); renderMonths(); saveToStorage();
        }

        function updateHeaderStats() {
            document.getElementById('display-balance').textContent = '$' + appState.balance.toFixed(2);
            document.getElementById('display-year').textContent = '📅 ' + (appState.year || new Date().getFullYear());
        }

        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewName).classList.add('active');
            const bc = document.getElementById('breadcrumb');
            let html = '<span onclick="showView(\'months\')">Accueil</span>';
            if (viewName === 'weeks' || viewName === 'trades') html += ` > <span onclick="showView('weeks')">${currentMonth}</span>`;
            if (viewName === 'trades') html += ` > <span class="current">S${currentWeek}</span>`;
            bc.innerHTML = html;
        }

        function renderMonths() {
            const grid = document.getElementById('months-grid'); grid.innerHTML = '';
            monthsList.forEach(month => {
                let count = 0;
                monthWeeksMap[month].forEach(w => { if (appState.weeks[w]) count += appState.weeks[w].length; });
                const card = document.createElement('div'); card.className = 'card'; card.onclick = () => selectMonth(month);
                card.innerHTML = `<div class="badge">${count} trades</div><h3>${month}</h3><p>Sem. ${monthWeeksMap[month][0]} à ${monthWeeksMap[month].slice(-1)[0]}</p>`;
                grid.appendChild(card);
            });
        }

        function selectMonth(month) { currentMonth = month; document.getElementById('weeks-title').textContent = month; renderWeeks(); showView('weeks'); }

        function renderWeeks() {
            const grid = document.getElementById('weeks-grid'); grid.innerHTML = '';
            monthWeeksMap[currentMonth].forEach(w => {
                const trades = appState.weeks[w] || [];
                const wins = trades.filter(t => t.result === 'WIN').length;
                const card = document.createElement('div'); card.className = 'card'; card.onclick = () => selectWeek(w);
                card.innerHTML = `<div class="badge" style="color:${wins>0?'var(--success)':'var(--text-secondary)'}">${wins} W</div><h3>Semaine ${w}</h3><p>${trades.length}/8 trades</p>`;
                grid.appendChild(card);
            });
        }

        function selectWeek(w) { currentWeek = w; if (!appState.weeks[w]) appState.weeks[w] = []; renderTrades(); showView('trades'); }

        function renderTrades() {
            const trades = appState.weeks[currentWeek]; const grid = document.getElementById('trades-grid'); grid.innerHTML = '';
            let wins = 0, tp = 0, sl = 0;
            trades.forEach(t => { if (t.result === 'WIN') wins++; if (t.tp) tp += parseFloat(t.tp); if (t.sl) sl += parseFloat(t.sl); });
            document.getElementById('stat-wins').textContent = wins;
            document.getElementById('stat-winrate').textContent = trades.length ? Math.round((wins/trades.length)*100) + '%' : '0%';
            document.getElementById('stat-tp').textContent = tp; document.getElementById('stat-sl').textContent = sl;

            for (let i = 0; i < 8; i++) {
                const t = trades[i]; const slot = document.createElement('div');
                if (t) {
                    const cls = t.result === 'WIN' ? 'win' : (t.result === 'LOSS' ? 'loss' : 'be');
                    slot.className = `trade-slot filled ${cls}`; slot.onclick = () => openTradeModal(i);
                    slot.innerHTML = `<div class="trade-number">Trade ${i+1}</div><div class="trade-pair">${pairFlags[t.pair] || ''} ${t.pair}</div><div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">${t.direction} • ${t.strategy}</div><span class="trade-result result-${t.result.toLowerCase()}">${t.result}</span><div style="margin-top:6px;font-weight:600;color:${t.pnl>=0?'var(--success)':'var(--danger)'}">${t.pnl>=0?'+':''}${parseFloat(t.pnl).toFixed(2)}$</div>`;
                } else {
                    slot.className = 'trade-slot'; slot.onclick = () => openTradeModal(i);
                    slot.innerHTML = `<div style="font-size:24px;color:var(--text-secondary);margin-bottom:4px;">+</div><div style="font-size:13px;color:var(--text-secondary);">Trade ${i+1}</div>`;
                }
                grid.appendChild(slot);
            }
        }

        function openTradeModal(index) {
            currentTradeIndex = index; const trades = appState.weeks[currentWeek]; const t = trades[index];
            document.getElementById('trade-index').value = index;
            document.getElementById('modal-title').textContent = t ? `Modifier Trade ${index+1}` : `Nouveau Trade ${index+1}`;
            document.getElementById('btn-delete').style.display = t ? 'block' : 'none';
            if (t) {
                ['pair','direction','date','time','session','strategy','sl','tp','result','pnl','emotion'].forEach(k => document.getElementById('t-'+k).value = t[k]);
                if (t.imgBefore) { document.getElementById('img-before').src = t.imgBefore; document.getElementById('img-before').classList.remove('hidden'); } else document.getElementById('img-before').classList.add('hidden');
                if (t.imgAfter) { document.getElementById('img-after').src = t.imgAfter; document.getElementById('img-after').classList.remove('hidden'); } else document.getElementById('img-after').classList.add('hidden');
            } else {
                document.getElementById('trade-form').reset(); document.getElementById('t-date').valueAsDate = new Date();
                document.getElementById('img-before').classList.add('hidden'); document.getElementById('img-after').classList.add('hidden');
            }
            updateCalculations(); document.getElementById('trade-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('trade-modal').classList.remove('active'); }

        function updateCalculations() {
            const sl = parseFloat(document.getElementById('t-sl').value) || 0;
            const tp = parseFloat(document.getElementById('t-tp').value) || 0;
            const res = document.getElementById('t-result').value;
            const riskAmt = appState.balance * (appState.riskPercent / 100);
            document.getElementById('calc-risk-amt').textContent = '$' + riskAmt.toFixed(2);
            document.getElementById('calc-sl-display').textContent = sl;
            document.getElementById('calc-lot').textContent = sl > 0 ? (riskAmt / (sl * 10)).toFixed(2) + ' Lot' : '0.00 Lot';
            
            let pnl = 0;
            if (res === 'LOSS') pnl = -riskAmt;
            else if (res === 'WIN') pnl = sl > 0 ? riskAmt * (tp / sl) : 0;
            document.getElementById('t-pnl').value = pnl.toFixed(2);
        }

        document.getElementById('t-sl').addEventListener('input', updateCalculations);
        document.getElementById('t-tp').addEventListener('input', updateCalculations);
        document.getElementById('t-result').addEventListener('change', updateCalculations);

        function handleImage(input, imgId) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 3 * 1024 * 1024) {
                    alert("Image trop volumineuse (max 3 Mo). Choisissez une image plus légère.");
                    input.value = ''; return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        // Compression : redimensionne si > 1000px de large pour économiser l'espace local
                        const canvas = document.createElement('canvas');
                        const maxW = 1000;
                        const scale = Math.min(1, maxW / img.width);
                        canvas.width = img.width * scale; canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const compressed = canvas.toDataURL('image/jpeg', 0.75);
                        document.getElementById(imgId).src = compressed;
                        document.getElementById(imgId).classList.remove('hidden');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function saveTrade(e) {
            e.preventDefault();
            const trades = appState.weeks[currentWeek]; const index = parseInt(document.getElementById('trade-index').value);
            const data = {
                pair: document.getElementById('t-pair').value, direction: document.getElementById('t-direction').value,
                date: document.getElementById('t-date').value, time: document.getElementById('t-time').value,
                session: document.getElementById('t-session').value, strategy: document.getElementById('t-strategy').value,
                sl: parseFloat(document.getElementById('t-sl').value), tp: parseFloat(document.getElementById('t-tp').value),
                result: document.getElementById('t-result').value, pnl: parseFloat(document.getElementById('t-pnl').value),
                emotion: document.getElementById('t-emotion').value,
                imgBefore: document.getElementById('img-before').classList.contains('hidden') ? null : document.getElementById('img-before').src,
                imgAfter: document.getElementById('img-after').classList.contains('hidden') ? null : document.getElementById('img-after').src
            };
            if (index >= 0 && trades[index]) appState.balance -= trades[index].pnl;
            appState.balance += data.pnl; trades[index] = data;
            trades.sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time));
            updateHeaderStats(); saveToStorage(); closeModal(); renderTrades();
        }

        function deleteTrade() {
            if (!confirm('Supprimer ce trade ?')) return;
            const index = parseInt(document.getElementById('trade-index').value);
            appState.balance -= appState.weeks[currentWeek][index].pnl;
            appState.weeks[currentWeek].splice(index, 1);
            updateHeaderStats(); saveToStorage(); closeModal(); renderTrades();
        }

        let saveTimeout = null;
        function saveToStorage() {
            try {
                localStorage.setItem('tradingJournal_v2', JSON.stringify(appState));
                const el = document.getElementById('save-status');
                el.textContent = '✅ Synchro';
                el.style.opacity = '1';
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => { el.style.opacity = '0.5'; }, 1500);
            } catch (err) {
                const el = document.getElementById('save-status');
                el.textContent = '⚠️ Erreur sauvegarde';
                console.error('Save error:', err);
            }
        }
        function loadFromStorage() {
            const data = localStorage.getItem('tradingJournal_v2');
            if (data) {
                appState = JSON.parse(data);
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                updateHeaderStats(); renderMonths();
            }
            else alert("Aucune sauvegarde trouvée.");
        }
        function exportData() {
            const a = document.createElement('a');
            a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appState));
            a.download = "trading_backup_" + new Date().toISOString().slice(0,10) + ".json";
            a.click();
        }
        function importData(input) {
            if (!input.files || !input.files[0]) return;
            if (!confirm("Importer ce fichier remplacera toutes les données actuelles. Continuer ?")) { input.value = ''; return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (typeof imported.balance !== 'number' || !imported.weeks) throw new Error('Format invalide');
                    appState = imported;
                    document.getElementById('setup-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'block';
                    updateHeaderStats(); renderMonths(); showView('months'); saveToStorage();
                    alert('Importation réussie !');
                } catch (err) {
                    alert('Erreur : fichier invalide.');
                }
                input.value = '';
            };
            reader.readAsText(input.files[0]);
        }
        document.getElementById('trade-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

        // Mode hors-ligne (PWA) : enregistrement du Service Worker (sw.js)
        // Doit être servi via http(s) (pas en ouvrant le fichier directement avec file://)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW échec', err));
            });
        }

        // Sauvegarde automatique périodique (filet de sécurité temps réel)
        setInterval(() => { if (appState.balance) saveToStorage(); }, 10000);

        // Sauvegarde avant fermeture/rafraîchissement
        window.addEventListener('beforeunload', () => { if (appState.balance) saveToStorage(); });

        // Chargement automatique d'une sauvegarde existante au démarrage
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('journal-year').value = new Date().getFullYear();
            const data = localStorage.getItem('tradingJournal_v2');
            if (data) {
                try {
                    appState = JSON.parse(data);
                    if (!appState.year) appState.year = new Date().getFullYear(); // migration anciennes données
                    document.getElementById('setup-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'block';
                    updateHeaderStats(); renderMonths();
                } catch (e) { console.error('Erreur chargement auto', e); }
            }
        });
    </script>
</body>
</html>
